name: Bug Report
description: Report a bug
title: "[Bug] "
labels:
  - bug

body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.5.117
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Log / Error Message

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
